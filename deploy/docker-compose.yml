services:
  postgres:
    image: postgres:16-alpine
    container_name: hypanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hypanel-backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hypanel-frontend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
